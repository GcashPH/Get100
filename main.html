<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SocialConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        .balance { font-size: 2.5rem; font-weight: 800; color: #1e293b; margin: 10px 0; }
        .chat-box { background: white; border-radius: 20px; height: 350px; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logs { flex-grow: 1; overflow-y: auto; font-size: 0.8rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 10px; border-radius: 12px; background: #f1f5f9; text-align: left; line-height: 1.4; }
        .winner { border-left: 4px solid #22c55e; background: #f0fdf4; color: #166534; font-weight: 600; }
        .bot { border-left: 4px solid #3b82f6; background: #eff6ff; color: #1e40af; }
        .user { border-left: 4px solid #ef4444; background: #fff1f2; color: #9f1239; }
        .btn { padding: 15px; border: none; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-invite { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-post { background: #1e293b; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div style="font-size: 0.7rem; font-weight: 700; color: #64748b; text-align: left;">TOTAL BALANCE</div>
        <div class="balance">₱<span id="balance">0.00</span></div>
        <button class="btn btn-invite">Invite Friends</button>
    </div>

    <div class="chat-box">
        <div style="font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 10px;">GLOBAL ACTIVITY</div>
        <div class="logs" id="chatLogs"></div>
        <button class="btn btn-post" id="btnPost">POST MY REFERRAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAK5I_7WeKouFM08SeOZcDHrXsgckYoULg",
      authDomain: "get100-8333e.firebaseapp.com",
      projectId: "get100-8333e",
      storageBucket: "get100-8333e.firebasestorage.app",
      messagingSenderId: "242341429618",
      appId: "1:242341429618:web:c596b279f746dc22851deb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const user = localStorage.getItem('active_user');

    function addLog(html, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = html;
        const logs = document.getElementById('chatLogs');
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
    }

    // 1. LIVE CHAT SYNC
    onSnapshot(query(collection(db, "public_chats"), orderBy("timestamp", "asc"), limit(20)), (snap) => {
        document.getElementById('chatLogs').innerHTML = "";
        snap.forEach(d => addLog(d.data().text, d.data().type));
    });

    // 2. SYNC BALANCE
    onSnapshot(doc(db, "users", user), (d) => {
        if(d.exists()) document.getElementById('balance').innerText = d.data().earnings.toFixed(2);
    });

    // 3. POST REFERRAL
    document.getElementById('btnPost').onclick = async () => {
        const snap = await getDoc(doc(db, "users", user));
        if(snap.exists()) {
            await addDoc(collection(db, "public_chats"), {
                text: `<b>User_${user.slice(-4)}</b>: Use code <b>${snap.data().referralCode}</b> to get ₱100!`,
                type: "user",
                timestamp: serverTimestamp()
            });
        }
    };

    // 4. WINNER SIMULATION (Visual Only)
    setInterval(() => {
        const id = "09" + Math.floor(Math.random()*90+10) + "****" + Math.floor(1000+Math.random()*9000);
        addLog(`<b>Alert</b>: User ${id} received ₱100.00 GCash!`, "winner");
    }, 150000);
</script>

</body>
</html>
