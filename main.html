<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin View | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg-light: #f8fafc;
            --card-white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; justify-content: center; min-height: 100vh; }
        
        .dashboard-container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        
        /* Dashboard Card */
        .earnings-card { 
            background: white; padding: 30px; border-radius: 32px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; 
            border: 1px solid rgba(255,255,255,1);
        }
        
        .amount-display { font-size: 3.2rem; font-weight: 800; margin: 15px 0; color: var(--text-dark); }
        .peso-sign { font-size: 1.8rem; color: var(--primary); margin-right: 5px; }

        .btn { padding: 16px; border: none; border-radius: 18px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; font-size: 1rem; }
        .btn-invite { background: var(--primary); color: white; box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3); }

        /* --- POP-UP MODAL --- */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); 
            display: none; justify-content: center; align-items: center; z-index: 100; 
        }
        
        .modal-content { 
            background: white; width: 90%; max-width: 380px; padding: 25px; 
            border-radius: 28px; position: relative; text-align: center; 
        }

        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); }
        
        .user-id-display { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            margin: 20px 0; background: #f8fafc; padding: 12px; border-radius: 15px;
        }
        .id-label { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .view-btn { border: none; background: #e2e8f0; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; }

        .double-line { border-top: 3px double #e2e8f0; margin: 20px 0; }

        /* Referral Section */
        .referral-box { 
            background: #fffbeb; border: 1px dashed #facc15; 
            padding: 15px; border-radius: 18px; margin-bottom: 20px; 
        }
        .ref-input { 
            width: 90%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; 
            text-align: center; margin-bottom: 10px; outline: none;
        }

        .btn-fb { background: #1877F2; color: white; }

        /* --- SHARE PAGE LAYOUT --- */
        .post-container { display: none; text-align: left; animation: fadeIn 0.4s; }
        .post-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        
        .photo-col img { width: 100%; border-radius: 15px; border: 1px solid #eee; }
        .caption-area { 
            background: #f1f5f9; padding: 10px; border-radius: 10px; 
            font-size: 0.75rem; border: 1px solid #e2e8f0; margin-top: 5px; line-height: 1.4;
        }
        
        .link-box { 
            background: #eef2ff; padding: 12px; border-radius: 12px; 
            border: 1px solid #c7d2fe; font-size: 0.8rem; color: var(--primary); 
            font-weight: 700; word-break: break-all;
        }
        
        .copy-tag { 
            display: inline-block; background: #475569; color: white; 
            padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; 
            margin-top: 6px; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="earnings-card">
        <div style="text-align: left; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1px;">MY EARNINGS</div>
        <div class="amount-display"><span class="peso-sign">₱</span>0.00</div>
        <button class="btn btn-invite" id="openInvite">Invite Friends</button>
    </div>
</div>

<div class="modal-overlay" id="modalInvite">
    <div class="modal-content">
        <span class="close-x" id="closeInvite">&times;</span>
        
        <div id="step-invite">
            <h3 style="margin-top: 10px;">Invite Partners</h3>
            <div class="user-id-display">
                <span class="id-label" id="display-id">09123456789</span>
                <button class="view-btn">View Code</button>
            </div>

            <div class="double-line"></div>

            <div class="referral-box" id="ref-section">
                <p style="font-size: 0.7rem; font-weight: 700; margin-bottom: 8px;">HAVE A REFERRAL CODE?</p>
                <input type="tel" class="ref-input" placeholder="Enter Code">
                <button class="btn" style="background:#000; color:#fff; padding:10px; margin-top:0; font-size:0.8rem;">Verify & Get ₱100</button>
            </div>

            <button class="btn btn-fb" id="btnGoShare">SHARE ON FACEBOOK</button>
        </div>

        <div id="step-share" class="post-container">
            <h3 style="text-align: center;">Post to Social Media</h3>
            <div class="post-grid">
                <div class="photo-col">
                    <p style="font-size: 0.65rem; font-weight: 800;">1. DOWNLOAD IMAGE</p>
                    <img src="https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=300" alt="Sample">
                    <div class="caption-area" id="caption-text">
                        Get ₱100.00 instantly!<br>
                        Use my Referral: <b>09123456789</b><br>
                        #Get100 #Referral_09123456789
                    </div>
                    <div class="copy-tag" onclick="copyText('caption-text')">Copy Caption</div>
                </div>

                <div class="link-col">
                    <p style="font-size: 0.65rem; font-weight: 800;">2. ATTACH LINK</p>
                    <div class="link-box" id="link-text">https://social.link/invite-user</div>
                    <div class="copy-tag" onclick="copyText('link-text')">Copy Link</div>
                </div>
            </div>
            <button class="btn" style="background:#e2e8f0; color:#475569;" id="btnBack">Back</button>
        </div>
    </div>
</div>

<script>
    // UI Interaction Logic (Static for Admin Preview)
    const modal = document.getElementById('modalInvite');
    const stepInvite = document.getElementById('step-invite');
    const stepShare = document.getElementById('step-share');

    // Open/Close
    document.getElementById('openInvite').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeInvite').onclick = () => {
        modal.style.display = 'none';
        resetSteps();
    };

    // Navigation
    document.getElementById('btnGoShare').onclick = () => {
        stepInvite.style.display = 'none';
        stepShare.style.display = 'block';
    };
    document.getElementById('btnBack').onclick = () => resetSteps();

    function resetSteps() {
        stepInvite.style.display = 'block';
        stepShare.style.display = 'none';
    }

    // Simple Copy Alert
    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('Copied to clipboard!');
        });
    }

    // Mabilisang preview: kung gusto mong i-test ang pagkawala ng referral box
    // Pwedeng i-comment out ito para makita ang referral box ulit.
    // document.getElementById('ref-section').classList.add('hidden');
</script>

</body>
</html>
