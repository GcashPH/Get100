<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SocialConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<div class="dashboard">
    <div class="glass-card balance-section">
        <div class="label">MY SAVINGS</div>
        <div class="amount">₱<span id="mainBalance">0.00</span></div>
        
        <div class="action-grid">
            <button class="btn btn-primary" id="openWithdraw">CASH OUT</button>
            <button class="btn btn-primary" id="openInvite">INVITE FRIENDS</button>
        </div>
    </div>

    <div class="glass-card feed-section">
        <div class="feed-header">
            <i class="fa-solid fa-leaf"></i> LIVE NETWORK FEED
        </div>

        <div class="chat-logs" id="chatLogs">
            </div>

        <div class="feed-footer">
            <button class="btn btn-post" id="btnPostRef">
                <i class="fa-solid fa-paper-plane"></i> POST MY REFERRAL CODE
            </button>
            <div id="cooldownTimer" class="timer-box hidden">
                Next post in: <span id="timer">00:00</span>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="withdrawModal">
    <div class="modal-content glass-morph">
        <span class="close-btn" id="closeWithdraw">&times;</span>
        <h2 class="modal-title">CASH OUT</h2>
        
        <div class="form-container">
            <div class="input-group">
                <label>Amount to Withdraw</label>
                <input type="text" id="withdrawAmount" class="input-field readonly" readonly>
            </div>

            <div class="input-group">
                <label>GCash Account Number</label>
                <input type="text" id="gcashPrefix" class="input-field readonly" readonly>
            </div>
            
            <div class="input-group">
                <label>Confirm Account Number</label>
                <div class="input-wrapper">
                    <input type="text" id="gcashConfirm" class="input-field" placeholder="Retype number manually..." onpaste="return false;">
                </div>
            </div>
            
            <button class="btn btn-claim" id="btnClaimGcash" disabled>CLAIM THRU GCASH</button>
        </div>
    </div>
</div>

<div class="modal" id="inviteModal">
    <div class="modal-content glass-morph">
        <span class="close-btn" id="closeModal">&times;</span>
        <div id="modalPage1">
            <h2 class="modal-title">ACCOUNT PROFILE</h2>
            <div class="id-badge">
                <span id="displayUserID">09000000000</span>
            </div>
            
            <div id="redeemSection" class="redeem-box">
                <p class="small-label">HAVE A REFERRAL CODE?</p>
                <input type="text" id="inputFriendCode" class="input-field" placeholder="ENTER 6-CHAR CODE">
                <button class="btn btn-claim" id="btnVerify">VERIFY CODE</button>
            </div>

            <button class="btn btn-fb" id="goSharePage">
                <i class="fa-brands fa-facebook"></i> SHARE ON FACEBOOK
            </button>
        </div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
