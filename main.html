<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | SocialConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body id="main-body">

    <div class="mobile-container">
        <div class="glass-panel text-center">
            <p class="panel-subtitle">CURRENT BALANCE</p>
            <h1 class="balance-display"><span class="currency">₱</span><span id="mainBalance">0.00</span></h1>
            <div class="button-row">
                <button id="openWithdraw" class="btn btn-action"><i class="fa-solid fa-building-columns"></i> WITHDRAW</button>
                <button id="openInvite" class="btn btn-action"><i class="fa-solid fa-user-plus"></i> INVITE</button>
            </div>
        </div>

        <div class="glass-panel feed-panel">
            <div class="feed-header">
                <p class="panel-header"><i class="fa-solid fa-chart-line"></i> LIVE ACTIVITY</p>
                <span class="live-indicator">LIVE</span>
            </div>
            
            <div id="chatLogs" class="chat-area">
                </div>
            
            <button id="btnPostRef" class="btn btn-post">POST REFERRAL CODE <i class="fa-solid fa-paper-plane"></i></button>
            <div id="cooldownTimer" class="timer-text hidden">Next post in: <span id="timer">0:00</span></div>
        </div>

        <div class="glass-panel text-center">
            <p class="panel-subtitle">LOGGED IN AS</p>
            <p id="displayUserID" class="user-id-text"></p>
        </div>
    </div>

    <div id="inviteModal" class="modal-overlay">
        <div class="modal-card text-center compact-modal">
            <button id="closeModal" class="btn-close">&times;</button>
            <div class="modal-header-icon highlight" style="margin-bottom: 10px;"><i class="fa-solid fa-gift"></i></div>
            <h2 class="modal-title" style="margin-bottom: 15px;">Invite Friends</h2>
            
            <div class="user-id-wrapper" style="margin-bottom: 15px; padding: 15px;">
                <p>YOUR REFERRAL CODE</p>
                <div class="code-display-area">
                    <h1 id="displayreferralCode" style="font-size: 1.8rem;">LOADING...</h1>
                    <i id="copyreferralCode" class="fa-solid fa-copy copy-icon"></i>
                </div>
            </div>

            <div id="redeemSection" class="redeem-box">
                <p class="panel-subtitle" style="color: var(--text-muted);">REDEEM A CODE</p>
                <div class="input-with-icon" style="margin-top: 5px;">
                    <input type="text" id="inputRedeemCode" class="input-box" placeholder="Enter referral code here..." style="padding: 14px; font-size: 0.9rem;">
                    <button id="btnSubmitRedeem" class="btn btn-submit" style="position: absolute; right: 5px; width: auto; padding: 8px 15px; border-radius: 12px; font-size: 0.85rem;">CLAIM</button>
                </div>
            </div>

            <button id="openShareModal" class="btn btn-facebook mt-10"><i class="fa-brands fa-facebook"></i> SHARE ON FACEBOOK</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
