<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | SocialConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body id="main-body">

    <div class="mobile-container">
        <div class="glass-panel text-center">
            <p class="panel-subtitle">CURRENT BALANCE</p>
            <h1 class="balance-display"><span class="currency">₱</span><span id="mainBalance">0.00</span></h1>
            <div class="button-row">
                <button id="openWithdraw" class="btn btn-action"><i class="fa-solid fa-building-columns"></i> WITHDRAW</button>
                <button id="openInvite" class="btn btn-action"><i class="fa-solid fa-user-plus"></i> INVITE</button>
            </div>
        </div>

        <div class="glass-panel feed-panel">
            <div class="feed-header">
                <p class="panel-header"><i class="fa-solid fa-chart-line"></i> LIVE ACTIVITY</p>
                <span class="live-indicator">LIVE</span>
            </div>
            
            <div id="chatLogs" class="chat-area">
                </div>
            
            <button id="btnPostRef" class="btn btn-post">POST REFERRAL CODE <i class="fa-solid fa-paper-plane"></i></button>
            <div id="cooldownTimer" class="timer-text hidden">Next post in: <span id="timer">0:00</span></div>
        </div>

        <div class="glass-panel text-center">
            <p class="panel-subtitle">LOGGED IN AS</p>
            <p id="displayUserID" class="user-id-text"></p>
        </div>
    </div>

    <div id="withdrawModal" class="modal-overlay">
        <div class="modal-card">
            <button id="closeWithdraw" class="btn-close">&times;</button>
            <div class="modal-header-icon"><i class="fa-solid fa-wallet"></i></div>
            <h2 class="modal-title">Withdraw Funds</h2>
            
            <div class="form-group">
                <label>GCash Number</label>
                <div class="input-with-icon">
                    <input type="tel" id="gcashPrefix" class="input-box locked" readonly>
                    <i id="changeNumber" class="fa-solid fa-circle-xmark icon-btn"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Number</label>
                <input type="tel" id="gcashConfirm" class="input-box" placeholder="Re-enter 11-digit number">
            </div>
            <div class="form-group">
                <label>Amount Available</label>
                <input type="text" id="withdrawAmount" class="input-box locked amount-box" readonly>
            </div>
            <button id="btnClaimGcash" class="btn btn-submit" disabled>CONFIRM WITHDRAWAL</button>
        </div>
    </div>

    <div id="inviteModal" class="modal-overlay">
        <div class="modal-card text-center">
            <button id="closeModal" class="btn-close">&times;</button>
            <div class="modal-header-icon highlight"><i class="fa-solid fa-gift"></i></div>
            <h2 class="modal-title">Invite Friends</h2>
            
            <div class="user-id-wrapper">
                <p>YOUR REFERRAL CODE</p>
                <div class="code-display-area">
                    <h1 id="displayreferralCode">LOADING...</h1>
                    <i id="copyreferralCode" class="fa-solid fa-copy copy-icon"></i>
                </div>
            </div>
            <button id="openShareModal" class="btn btn-facebook"><i class="fa-brands fa-facebook"></i> SHARE ON FACEBOOK</button>
        </div>
    </div>

    <div id="shareModal" class="modal-overlay">
        <div class="modal-card">
            <button id="closeShareModal" class="btn-close">&times;</button>
            <h2 class="modal-title">Share Promo</h2>
            <textarea id="promoCaption" class="input-box" rows="4" readonly></textarea>
            <button id="btnCopyCaption" class="btn btn-action mt-10" style="width: 100%;">COPY CAPTION <i class="fa-solid fa-copy"></i></button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
