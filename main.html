<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SocialConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg-light: #f1f5f9;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-light); display: flex; justify-content: center; min-height: 100vh; }
        .dashboard-container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        
        /* Earnings Card */
        .earnings-card { 
            background: white; padding: 25px; border-radius: 32px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px;
        }
        .amount-display { font-size: 3rem; font-weight: 800; margin: 10px 0; color: var(--text-dark); }
        .peso-sign { font-size: 1.6rem; color: var(--primary); margin-right: 5px; }

        /* --- CLASSIC CHAT THEME --- */
        .chat-section {
            background: white; border-radius: 24px; padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); height: 350px; display: flex; flex-direction: column;
        }
        .chat-logs { flex-grow: 1; overflow-y: auto; font-size: 0.8rem; padding: 5px; margin-bottom: 10px; border-bottom: 1px solid #f1f5f9; }
        
        /* Message Styles */
        .msg { margin-bottom: 8px; padding: 10px 14px; border-radius: 15px; background: #f8fafc; animation: fadeIn 0.3s; line-height: 1.4; }
        .winner-msg { border-left: 4px solid #22c55e; background: #f0fdf4; font-weight: 600; color: #166534; }
        .bot-msg { background: #eff6ff; color: #1e40af; border-left: 4px solid #3b82f6; }
        .user-msg { background: #fff1f2; color: #9f1239; border-left: 4px solid #f43f5e; }

        .btn { padding: 16px; border: none; border-radius: 18px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; font-size: 0.9rem; }
        .btn-invite { background: var(--primary); color: white; }
        .btn-post { background: #0f172a; color: white; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; width: 90%; max-width: 380px; padding: 25px; border-radius: 28px; position: relative; text-align: center; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="earnings-card">
        <div style="text-align: left; font-size: 0.75rem; font-weight: 700; color: var(--text-muted);">MY EARNINGS</div>
        <div class="amount-display"><span class="peso-sign">₱</span><span id="balance">0.00</span></div>
        <button class="btn btn-invite" id="openInvite">Invite Friends</button>
    </div>

    <div class="chat-section">
        <div style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 8px;">LIVE ACTIVITY</div>
        <div class="chat-logs" id="chatLogs"></div>
        <button class="btn btn-post" id="btnPostRef">POST REFERRAL CODE</button>
    </div>
</div>

<div class="modal-overlay" id="modalInvite">
    <div class="modal-content">
        <span class="close-x" id="closeInvite">&times;</span>
        <div id="step-invite">
            <h3>Invite Partners</h3>
            <div id="display-id" style="font-weight: 800; color: var(--primary); margin: 15px 0;"></div>
            <button class="btn" style="background:#000; color:#fff;" id="btnVerify">Verify Referral</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getFirestore, doc, getDoc, updateDoc, collection, addDoc, 
        query, where, getDocs, onSnapshot, orderBy, limit, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAK5I_7WeKouFM08SeOZcDHrXsgckYoULg",
        authDomain: "get100-8333e.firebaseapp.com",
        projectId: "get100-8333e",
        storageBucket: "get100-8333e.firebasestorage.app",
        messagingSenderId: "242341429618",
        appId: "1:242341429618:web:c596b279f746dc22851deb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentUser = localStorage.getItem('active_user');

    const chatLogs = document.getElementById('chatLogs');

    // UI Helper: Add Message to UI
    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        chatLogs.appendChild(div);
        chatLogs.scrollTop = chatLogs.scrollHeight;
    }

    // 1. LISTEN TO LIVE CHAT (From Firestore)
    const q = query(collection(db, "public_chats"), orderBy("timestamp", "asc"), limit(20));
    onSnapshot(q, (snapshot) => {
        chatLogs.innerHTML = ""; // Clear for refresh
        snapshot.forEach((doc) => {
            const data = doc.data();
            addMessage(data.text, data.type);
        });
    });

    // 2. BOT REFERRAL LOGIC (Fetch Active Codes)
    async function triggerBotReferral() {
        const qBot = query(collection(db, "bot_referrals"), where("status", "==", "active"), limit(1));
        const snap = await getDocs(qBot);
        if (!snap.empty) {
            const botData = snap.docs[0].data();
            addMessage(`<b>Bot_System</b>: Use this code to get ₱100: <b>${botData.code}</b>`, "bot-msg");
        }
    }

    // 3. WINNER INTERVALS (Display Only - No DB Save)
    function triggerWinner() {
        const randomID = "09" + Math.floor(Math.random()*90+10) + "****" + Math.floor(1000+Math.random()*9000);
        addMessage(`<b>Alert</b>: User ${randomID} received ₱100.00 via GCash!`, "winner-msg");
    }

    // 4. USER POST ACTION (Save to Firestore)
    document.getElementById('btnPostRef').onclick = async () => {
        const lastPost = localStorage.getItem('last_post_time');
        const now = Date.now();

        if (lastPost && (now - lastPost < 86400000)) { // 24H check
            alert("You can only post once every 24 hours.");
            return;
        }

        const userSnap = await getDoc(doc(db, "users", currentUser));
        const myCode = userSnap.data()?.referralCode || "N/A";

        // Save to Firestore so everyone sees it
        await addDoc(collection(db, "public_chats"), {
            text: `<b>User_${currentUser.slice(-4)}</b>: My referral code is <b>${myCode}</b>. Use it now!`,
            type: "user-msg",
            timestamp: serverTimestamp()
        });

        localStorage.setItem('last_post_time', now);
    };

    // Initialize Intervals
    window.onload = () => {
        if (!currentUser) { window.location.href = "index.html"; return; }
        document.getElementById('display-id').innerText = "ID: " + currentUser;

        // Start Bots & Winners
        setInterval(triggerWinner, 90000); // 1.5 mins
        setInterval(triggerBotReferral, 300000); // 5 mins
        
        // Initial Launch
        setTimeout(triggerWinner, 2000);
        setTimeout(triggerBotReferral, 5000);
    };

    // Modal Triggers
    const modal = document.getElementById('modalInvite');
    document.getElementById('openInvite').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeInvite').onclick = () => modal.style.display = 'none';

</script>

</body>
</html>
