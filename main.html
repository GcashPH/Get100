<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SocialConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
    <div class="balance-card">
        <div class="balance-label">AVAILABLE BALANCE</div>
        <div class="balance-amount">₱<span id="mainBalance">0.00</span></div>
        <button class="btn btn-invite" id="openInvite">INVITE & EARN</button>
    </div>

    <div class="chat-box">
        <div style="font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 15px;">LIVE NETWORK FEED</div>
        <div class="chat-logs" id="chatLogs"></div>
    </div>
</div>

<div class="modal" id="inviteModal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">×</span>
        
        <div id="modalPage1">
            <h3 style="text-align: center; margin: 0;">Account Profile</h3>
            <div class="user-id-box">
                <span class="user-id-text" id="displayUserID">09000000000</span>
                <button class="view-icon-btn" id="viewMyCode"><i class="fa-solid fa-eye"></i></button>
            </div>

            <hr class="divider">

            <div id="redeemSection" class="redeem-section">
                <p style="font-size: 0.7rem; font-weight: 800; text-align: center; margin-bottom: 10px;">ENTER REFERRAL CODE</p>
                <input type="text" id="inputFriendCode" class="redeem-input" placeholder="6-CHAR CODE">
                <button class="btn btn-verify" id="btnVerify">VERIFY CODE</button>
            </div>

            <button class="btn btn-fb" id="goSharePage">SHARE ON FACEBOOK</button>
        </div>

        <div id="modalPage2" class="hidden">
            <h3 style="margin: 0;">Post to Social Media</h3>
            <div class="share-grid">
                <div class="photo-box">
                    <img id="promoPhoto" src="" alt="Promo">
                </div>
                <div class="caption-box">
                    <div id="captionText">Loading caption...</div>
                    <button class="copy-btn" id="btnCopyCaption"><i class="fa-solid fa-copy"></i> Copy</button>
                </div>
            </div>

            <div class="shortlink-box">
                <strong>Short Link:</strong><br>
                <a id="shortLink" href="#" target="_blank">loading...</a>
            </div>

            <button class="btn" id="backToP1" style="background:none; color:#64748b; font-size:0.8rem; margin-top:15px;">← Back to Profile</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
