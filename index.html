<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialConnect | Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="app-flow">
        <h2 id="title">SocialConnect</h2>
        <p class="sub-text" id="instruction">Enter your 11-digit mobile number</p>
        
        <div id="mobile-section">
            <input type="tel" id="mobile" placeholder="09xxxxxxxxx" maxlength="11">
            <div id="mobile-err" class="error hidden">Must be 11 digits starting with 09</div>
        </div>

        <div id="keypad-section" class="hidden">
            <div class="dot-container" id="dot-viewer">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div class="keypad-container">
                <div class="key" data-val="1">1</div>
                <div class="key" data-val="2">2</div>
                <div class="key" data-val="3">3</div>
                <div class="key" data-val="4">4</div>
                <div class="key" data-val="5">5</div>
                <div class="key" data-val="6">6</div>
                <div class="key" data-val="7">7</div>
                <div class="key" data-val="8">8</div>
                <div class="key" data-val="9">9</div>
                <div class="key zero" data-val="0">0</div>
            </div>
            
            <button id="btnRegister" class="hidden">Complete Registration</button>
        </div>
    </div>
</div>

<script type="module" src="config.js"></script>
</body>
</html>
