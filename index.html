<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SocialConnect | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

<div class="glass-container">
    
    <div id="scan-layer">
        <div class="scanner-circle">
            <i class="fa-solid fa-fingerprint fingerprint-icon"></i>
            <div class="scan-line"></div>
        </div>
        <h2 class="title-text">RECOGNIZING DEVICE</h2>
        <p class="sub-text">Analyzing hardware signatures...</p>
    </div>

    <div id="auth-layer" class="hidden">
        <h2 id="ui-title" class="title-text">SocialConnect</h2>
        <p id="ui-subtitle" class="sub-text"></p>

        <div id="user-badge" class="hidden">
        <div class="fingerprint-btn">
        <i class="fa-solid fa-fingerprint"></i>
        </div>
    <div id="masked-id" class="masked-id">09*******1234</div>
    <p style="font-size: 10px; color: var(--accent);">VERIFY ACCESS</p>
    </div>

        <div id="mobile-box" class="input-group">
            <input type="tel" id="mobile" placeholder="Enter 09xxxxxxxxx" maxlength="11">
            <div id="mobile-err" class="error hidden">Must start with 09 (11 digits)</div>
        </div>

        <div id="keypad-section" class="hidden">
            <p class="pin-label">ENTER 6-DIGIT SECURITY KEY</p>
            <div class="dot-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div class="keypad-container">
                <div class="key" data-val="1">1</div>
                <div class="key" data-val="2">2</div>
                <div class="key" data-val="3">3</div>
                <div class="key" data-val="4">4</div>
                <div class="key" data-val="5">5</div>
                <div class="key" data-val="6">6</div>
                <div class="key" data-val="7">7</div>
                <div class="key" data-val="8">8</div>
                <div class="key" data-val="9">9</div>
<div class="keypad-grid">
    <div class="key" data-val="clear"><i class="fa-solid fa-backspace"></i></div>
    <div class="key" data-val="0">0</div>
    <div class="key" style="visibility:hidden;"></div> </div>

            </div>
            
            <button id="btnAction" class="btn-submit hidden">PROCEED TO DASHBOARD <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>
</div>

<script type="module" src="js/config.js"></script>
</body>
</html>
