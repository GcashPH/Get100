<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialConnect | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

<div class="container">
    <div id="scan-layer">
        <div class="scanner-circle">
            <div class="scan-line"></div>
        </div>
        <h2 class="glitch">RECOGNIZING DEVICE</h2>
        <p class="sub-text">Analyzing hardware signatures...</p>
    </div>

    <div id="auth-layer" class="hidden">
        <h2 id="ui-title">SocialConnect</h2>
        <p id="ui-subtitle" class="sub-text"></p>

        <div id="user-badge" class="hidden">
            <div class="avatar-icon">👤</div>
            <div id="masked-id" class="masked-id">09** **** 1234</div>
        </div>

        <div id="mobile-box">
            <input type="tel" id="mobile" placeholder="09xxxxxxxxx" maxlength="11">
            <div id="mobile-err" class="error hidden">Starts with 09 (11 digits)</div>
        </div>

        <div id="keypad-section" class="hidden">
            <div class="dot-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <div class="keypad-container">
                <div class="key" data-val="1">1</div>
                <div class="key" data-val="2">2</div>
                <div class="key" data-val="3">3</div>
                <div class="key" data-val="4">4</div>
                <div class="key" data-val="5">5</div>
                <div class="key" data-val="6">6</div>
                <div class="key" data-val="7">7</div>
                <div class="key" data-val="8">8</div>
                <div class="key" data-val="9">9</div>
                <div class="key zero" data-val="0">0</div>
            </div>
            
            <button id="btnAction" class="hidden">PROCEED</button>
        </div>
    </div>
</div>

<script type="module" src="js/config.js"></script>
</body>
</html>
